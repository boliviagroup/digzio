<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #0F172A;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #F8FAFC;
        }
        /* Background geometric shapes */
        .shape-1 {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(15, 23, 42, 0) 70%);
            z-index: 1;
        }
        .shape-2 {
            position: absolute;
            bottom: -150px;
            left: -150px;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, rgba(15, 23, 42, 0) 70%);
            z-index: 1;
        }
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 2;
        }
        .content-wrapper {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 900px;
            padding: 60px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .logo-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #38BDF8 0%, #10B981 100%);
            border-radius: 20px;
            margin-bottom: 40px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 48px;
            font-weight: 700;
            color: #0F172A;
            transform: rotate(45deg);
        }
        .logo-mark span {
            transform: rotate(-45deg);
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 64px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 24px;
            background: linear-gradient(to right, #F8FAFC, #38BDF8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h2 {
            font-size: 28px;
            font-weight: 400;
            color: #94A3B8;
            line-height: 1.5;
        }
        .accent-line {
            width: 100px;
            height: 4px;
            background: #10B981;
            margin: 40px auto 0;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="shape-1"></div>
        <div class="shape-2"></div>
        <div class="grid-overlay"></div>
        
        <div class="content-wrapper">
            <div class="logo-mark"><span>D</span></div>
            <h1>Digzio Technology Overview</h1>
            <h2>Full-Stack Architecture, Microservices & Mobile Apps (iOS + Android)</h2>
            <div class="accent-line"></div>
        </div>
    </div>
</body>
</html>
