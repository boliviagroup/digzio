<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #0F2D4A;
            font-family: 'Space Grotesk', sans-serif;
            color: #FFFFFF;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        /* Circuit-line accents */
        .circuit-line {
            position: absolute;
            background-color: #1A9BAD;
        }
        .line-1 { top: 100px; left: 0; width: 300px; height: 2px; }
        .line-2 { top: 100px; left: 300px; width: 2px; height: 150px; }
        .line-3 { top: 250px; left: 300px; width: 100px; height: 2px; }
        
        .line-4 { bottom: 100px; right: 0; width: 400px; height: 2px; }
        .line-5 { bottom: 100px; right: 400px; width: 2px; height: 200px; }
        .line-6 { bottom: 300px; right: 400px; width: 150px; height: 2px; }
        
        .node {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #2EC4C4;
            border-radius: 50%;
            box-shadow: 0 0 10px #2EC4C4;
        }
        .node-1 { top: 245px; left: 395px; }
        .node-2 { bottom: 295px; right: 545px; }

        .content-wrapper {
            text-align: center;
            z-index: 10;
            padding: 60px;
            border: 1px solid rgba(26, 155, 173, 0.3);
            background: rgba(15, 45, 74, 0.8);
            backdrop-filter: blur(5px);
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            background-color: rgba(46, 196, 196, 0.1);
            border: 1px solid #2EC4C4;
            color: #2EC4C4;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        h2 {
            font-size: 28px;
            font-weight: 400;
            color: #CBD5E1;
            margin-bottom: 40px;
        }

        .meta-data {
            display: flex;
            justify-content: center;
            gap: 40px;
            font-size: 18px;
            color: #1A9BAD;
            font-weight: 600;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="slide-container">
        <!-- Circuit Background Elements -->
        <div class="circuit-line line-1"></div>
        <div class="circuit-line line-2"></div>
        <div class="circuit-line line-3"></div>
        <div class="node node-1"></div>
        
        <div class="circuit-line line-4"></div>
        <div class="circuit-line line-5"></div>
        <div class="circuit-line line-6"></div>
        <div class="node node-2"></div>

        <div class="content-wrapper">
            <div class="status-badge">
                <i class="fas fa-check-circle"></i> SYSTEM ONLINE
            </div>
            <h1>Digzio Sprint 1 Complete</h1>
            <h2>AWS Infrastructure Provisioning Live</h2>
            
            <div class="meta-data">
                <div class="meta-item">
                    <i class="fas fa-map-marker-alt"></i> af-south-1 (Cape Town)
                </div>
                <div class="meta-item">
                    <i class="fas fa-shield-alt"></i> POPIA-Compliant
                </div>
                <div class="meta-item">
                    <i class="fas fa-calendar-alt"></i> 23 April 2026
                </div>
            </div>
        </div>
    </div>
</body>
</html>
