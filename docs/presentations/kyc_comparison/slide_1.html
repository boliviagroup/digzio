<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #0B0C10;
            font-family: 'Space Grotesk', sans-serif;
            position: relative;
            overflow: hidden;
            display: flex;
        }
        
        /* Background Geometric Shapes */
        .shape-circle-1 {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(102, 252, 241, 0.1) 0%, rgba(69, 162, 158, 0.05) 100%);
            top: -200px;
            right: -100px;
            z-index: 1;
        }
        .shape-circle-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 2px solid rgba(102, 252, 241, 0.2);
            bottom: -150px;
            left: 30%;
            z-index: 1;
        }
        .shape-rect-1 {
            position: absolute;
            width: 300px;
            height: 800px;
            background-color: rgba(69, 162, 158, 0.1);
            transform: rotate(45deg);
            right: 15%;
            top: -100px;
            z-index: 1;
        }

        /* Content Layout */
        .content-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            width: 100%;
            height: 100%;
        }

        .left-panel {
            width: 60%;
            /* keep top padding for title consistency, reduce bottom and side padding to save height */
            padding: 120px 40px 40px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .right-panel {
            width: 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Typography */
        .title {
            color: #FFFFFF;
            font-size: 72px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .title-highlight {
            color: #66FCF1;
        }

        .subtitle {
            color: #45A29E;
            font-size: 32px;
            font-weight: 500;
            line-height: 1.3;
            margin-bottom: 20px; /* reduced from 60 to save vertical space */
            max-width: 90%;
        }

        .details-container {
            margin-top: auto;
            border-top: 2px solid rgba(197, 198, 199, 0.2);
            padding-top: 12px; /* reduced from 30 */
        }

        .details {
            color: #C5C6C7;
            font-size: 18px;
            font-weight: 500;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .detail-icon {
            color: #66FCF1;
            font-size: 14px;
        }

        /* Right Panel Abstract Graphic - reduced size to save height */
        .abstract-graphic {
            position: relative;
            width: 260px;
            height: 300px; /* reduced from 400 */
        }

        .graphic-box {
            position: absolute;
            width: 200px;
            height: 120px; /* reduced from 160 */
            border: 3px solid #66FCF1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
            color: #FFFFFF;
            background-color: rgba(11, 12, 16, 0.8);
            backdrop-filter: blur(4px);
        }

        .box-onfido {
            top: 20px;
            left: 0;
            border-color: #C5C6C7;
            color: #C5C6C7;
        }

        .box-dha {
            bottom: 20px;
            right: 0;
            border-color: #66FCF1;
            box-shadow: 0 0 30px rgba(102, 252, 241, 0.2);
        }

        .graphic-vs {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background-color: #45A29E;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0B0C10;
            font-weight: 900;
            font-size: 20px;
            z-index: 5;
        }
        
        .accent-line {
            width: 80px;
            height: 6px;
            background-color: #66FCF1;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <!-- Background Shapes -->
        <div class="shape-circle-1"></div>
        <div class="shape-circle-2"></div>
        <div class="shape-rect-1"></div>

        <!-- Content -->
        <div class="content-wrapper">
            <div class="left-panel">
                <div class="accent-line"></div>
                <h1 class="title">Choosing the Right <br><span class="title-highlight">KYC Stack</span> for Digzio</h1>
                <h2 class="subtitle">A Strategic Comparison: Onfido vs DHA + Smile Identity</h2>
                
                <div class="details-container">
                    <div class="details">
                        <div class="detail-item">
                            <span class="detail-icon">▶</span>
                            <span>Prepared by Manus AI</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-icon">▶</span>
                            <span>April 2026</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-icon">▶</span>
                            <span>Digzio Platform Engineering</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="right-panel">
                <div class="abstract-graphic">
                    <div class="graphic-box box-onfido">ONFIDO</div>
                    <div class="graphic-vs">VS</div>
                    <div class="graphic-box box-dha">DHA + SMILE</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
